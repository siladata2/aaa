<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>𝚂𝙸𝙻𝙰 𝙼𝙸𝙽𝙸 - Pair Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        /* Reset */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background:
                radial-gradient(circle at 50% 50%, rgba(0, 100, 255, 0.15), transparent 40%),
                radial-gradient(circle at 25% 75%, rgba(0, 80, 255, 0.08), transparent 40%),
                radial-gradient(circle at 75% 25%, rgba(0, 120, 255, 0.08), transparent 40%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: #141428;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 20px #0066ff33, 0 0 40px #0044ff11;
            border: 1px solid rgba(0, 100, 255, 0.3);
            backdrop-filter: blur(10px);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        h1 {
            color: #4488ff;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-shadow: 0 0 15px #4488ff88, 0 0 30px #2266ff44;
        }
        h4 {
            color: #8899bb;
            font-weight: 400;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 35px;
            border: 2px solid #3355aa55;
            background: #0a0a1a;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #4488ff;
            box-shadow: 0 0 15px #4488ff33;
        }
        input::placeholder {
            color: #556677;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 2px solid #4488ff;
            background: transparent;
            color: #4488ff;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #4488ff44;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        button:hover {
            background: #4488ff;
            color: #0a0a1a;
            box-shadow: 0 0 25px #4488ff88, 0 0 50px #2266ff33;
        }

        #pair {
            margin-top: 20px;
            font-size: 1rem;
            color: #fff;
        }
        #copy {
            cursor: pointer;
            color: #ff4d4d;
            font-weight: bold;
            margin-left: 5px;
            transition: 0.3s;
        }
        #copy:hover {
            color: #ff8080;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #556677;
        }
        .footer a {
            color: #4488ff;
            text-decoration: none;
            transition: 0.3s;
        }
        .footer a:hover {
            color: #66aaff;
            text-shadow: 0 0 10px #4488ff55;
        }

        /* Loading state */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>𝚂𝙸𝙻𝙰 𝙼𝙸𝙽𝙸™</h1>
        <h4>Enter your WhatsApp number with country code</h4>
        <div class="input-group">
            <input type="number" id="number" placeholder="e.g. 255789xxxxxx">
        </div>
        <button id="submit"><i class="fas fa-key"></i> Generate Code</button>
        <div id="pair"></div>
        <div class="footer">&copy; 2026 — Developed by <br><a href="#">𝚂𝙸𝙻𝙰 𝚃𝚎𝚌𝚑</a></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js">
    </script>
    <script>
        const input = document.getElementById("number");
        const button = document.getElementById("submit");
        const output = document.getElementById("pair");

        async function Copy() {
            const codeEl = document.getElementById("copy");
            if (!codeEl) return;
            // Extract code from the span inside
            const codeSpan = codeEl.querySelector('span');
            const code = codeSpan ? codeSpan.innerText : codeEl.innerText.replace("CODE: ", "");
            try {
                await navigator.clipboard.writeText(code);
                const originalText = codeEl.innerHTML;
                codeEl.innerHTML = 'COPIED! ✅';
                setTimeout(() => {
                    codeEl.innerHTML = originalText;
                }, 1500);
            } catch (err) {
                // Fallback for non-secure contexts
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                const originalText = codeEl.innerHTML;
                codeEl.innerHTML = 'COPIED! ✅';
                setTimeout(() => {
                    codeEl.innerHTML = originalText;
                }, 1500);
            }
        }

        button.addEventListener("click", async () => {
            const raw = input.value.trim().replace(/[^0-9]/g, "");
            if (!raw || raw.length < 11) {
                output.innerHTML = `<p style="color:#ff6b6b;">Invalid number</p>`;
                return;
            }
            input.disabled = true;
            button.disabled = true;
            button.classList.add('loading');
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Please wait...';
            output.innerHTML = `<p style="color:#4488ff;">Fetching Code...</p>`;
            try {
                const { data } = await axios(`/freebot?number=${raw}`);
                const code = data.code || "Unavailable";
                output.innerHTML = `
                    <p id="copy" onclick="Copy()">
                        CODE: <span style="color:white;font-weight:700;">${code}</span>
                        <i class="fas fa-copy" style="margin-left:8px;color:#4488ff;"></i>
                    </p>
                `;
            } catch (e) {
                output.innerHTML = `<p style="color:red;">Server error. Please try again.</p>`;
            }
            input.disabled = false;
            button.disabled = false;
            button.classList.remove('loading');
            button.innerHTML = originalText;
        });

        // Allow Enter key to submit
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                button.click();
            }
        });
    </script>

</body>
</html>
